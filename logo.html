<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flui.</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 5px;
      height: 5px;
      background: #e4e0d7;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1000;
      transition: width 0.25s ease, height 0.25s ease,
                  background 0.25s ease, border-radius 0.25s ease;
    }
    #cursor.on-label {
      width: 40px;
      height: 40px;
      background: transparent;
      border: 1px solid rgba(228, 224, 215, 0.5);
      border-radius: 50%;
    }

    /* Labels */
    .label {
      position: fixed;
      color: #e4e0d7;
      opacity: 0.72;
      will-change: transform;
      cursor: none;
      user-select: none;
      transition: opacity 0.5s ease;
      line-height: 1;
    }
    .label:hover { opacity: 1; }

    #lbl-flui {
      top: 9vh;
      left: 6vw;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(38px, 9vw, 118px);
      letter-spacing: -0.03em;
    }

    #lbl-aflo {
      bottom: 11vh;
      right: 5vw;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(26px, 5.8vw, 78px);
      letter-spacing: 0.01em;
      text-align: right;
    }

    /* Logo mark */
    #logo-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      will-change: transform;
    }
    #logo-svg {
      display: block;
      width: 150px;
      height: 150px;
      transform: translate(-50%, -50%);
    }

    /* Wordmark */
    #wordmark {
      position: fixed;
      bottom: 2.5vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #e4e0d7;
      opacity: 0.22;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="lbl-flui" class="label">flui:id</div>

<div id="logo-wrap">
  <svg id="logo-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="9" markerHeight="7"
              refX="9" refY="3.5" orient="auto"
              markerUnits="userSpaceOnUse">
        <polygon points="0 0, 9 3.5, 0 7" fill="#e4e0d7" opacity="0.75"/>
      </marker>
    </defs>

    <!-- Structural triangle -->
    <polygon points="100,28 158.9,130 41.1,130"
             stroke="#e4e0d7" stroke-width="0.4"
             fill="none" stroke-dasharray="2 7" opacity="0.18"/>

    <!-- Flow arcs -->
    <path d="M 121.1,32.8 A 68,68 0 0,1 166.5,111.1"
          stroke="#e4e0d7" stroke-width="1.4" stroke-linecap="round"
          marker-end="url(#arr)" opacity="0.65"/>
    <path d="M 145.1,147.1 A 68,68 0 0,1 54.9,147.1"
          stroke="#e4e0d7" stroke-width="1.4" stroke-linecap="round"
          marker-end="url(#arr)" opacity="0.65"/>
    <path d="M 33.5,111.1 A 68,68 0 0,1 78.9,32.8"
          stroke="#e4e0d7" stroke-width="1.4" stroke-linecap="round"
          marker-end="url(#arr)" opacity="0.65"/>

    <!-- Vertex nodes -->
    <circle cx="100"   cy="28"  r="3" fill="#e4e0d7" opacity="0.75"/>
    <circle cx="158.9" cy="130" r="3" fill="#e4e0d7" opacity="0.75"/>
    <circle cx="41.1"  cy="130" r="3" fill="#e4e0d7" opacity="0.75"/>

    <!-- Wine bottle — rotated by JS around (100, 96) -->
    <g id="bottle">
      <path d="M 95.5,70 L 95.5,82
               C 95.5,86 87,92 87,106
               L 87,117 C 87,122 93.5,124 100,124
               C 106.5,124 113,122 113,117
               L 113,106 C 113,92 104.5,86 104.5,82
               L 104.5,70 Z"
            stroke="#e4e0d7" stroke-width="0.8" fill="none" opacity="0.55"/>
      <rect x="95.5" y="65" width="9" height="6" rx="1.5"
            fill="#e4e0d7" opacity="0.35"/>
    </g>
  </svg>
</div>

<div id="lbl-aflo" class="label">aflorestamos</div>

<div id="wordmark">flui.</div>

<script>
  const cursor   = document.getElementById('cursor');
  const logoWrap = document.getElementById('logo-wrap');
  const lblFlui  = document.getElementById('lbl-flui');
  const lblAflo  = document.getElementById('lbl-aflo');
  const bottle   = document.getElementById('bottle');

  let mx = 0, my = 0;   // raw mouse, normalised −1…1 from center
  let sx = 0, sy = 0;   // smoothed
  let bottleAngle = 0;
  let lastTime = performance.now();

  // Raw cursor position (precise — no lerp)
  window.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    mx = (e.clientX / window.innerWidth  - 0.5) * 2;
    my = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  // Cursor state on labels
  [lblFlui, lblAflo].forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('on-label'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('on-label'));
  });

  // Navigate
  lblFlui.addEventListener('click', () => window.location.href = '/sound');
  lblAflo.addEventListener('click', () => window.location.href = '/systems');

  function loop(now) {
    const dt = now - lastTime;
    lastTime = now;

    // Smooth with inertia — slow, ambient
    sx += (mx - sx) * 0.045;
    sy += (my - sy) * 0.045;

    // Parallax — labels move in opposite directions, logo barely moves
    lblFlui.style.transform  = `translate(${sx * 22}px, ${sy * 14}px)`;
    lblAflo.style.transform  = `translate(${-sx * 16}px, ${-sy * 10}px)`;
    logoWrap.style.transform =
      `translate(calc(-50% + ${sx * 6}px), calc(-50% + ${sy * 6}px))`;

    // Bottle spin
    bottleAngle += 0.18 * (dt / 16);
    bottle.setAttribute('transform', `rotate(${bottleAngle}, 100, 96)`);

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
</script>

</body>
</html>
