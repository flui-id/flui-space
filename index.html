<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Jonas Brosch — Porto.">
  <meta name="theme-color" content="#0C0A07">
  <meta property="og:title" content="Jonas Brosch">
  <meta property="og:description" content="Nothing is waste. Not yet.">
  <title>Jonas Brosch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Persistent rotating ring -->
  <div class="ring-wrap" aria-hidden="true">
    <svg class="ring" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48.5" stroke="currentColor" stroke-width="0.15"/>
      <circle cx="50" cy="50" r="46"   stroke="currentColor" stroke-width="0.4" stroke-dasharray="0.5 4.24"/>
      <circle cx="50" cy="50" r="43.5" stroke="currentColor" stroke-width="0.15"/>
    </svg>
  </div>

  <main id="main">

    <!-- 01 -->
    <section class="screen" id="s1">
      <div class="content align-left-mid">
        <h1 class="statement hero reveal">Nothing is waste.<br>Not yet.</h1>
        <span class="label reveal delay-1">JONAS BROSCH — PORTO</span>
      </div>
    </section>

    <!-- 02 -->
    <section class="screen" id="s2">
      <div class="content align-right-mid">
        <p class="statement reveal">
          Portugal makes<br>extraordinary wine.<br>
          Germany invented<br>the Pfand.<br>
          I live in between.
        </p>
      </div>
    </section>

    <!-- 03 -->
    <section class="screen" id="s3">
      <div class="content align-left-bottom">
        <p class="statement current reveal">Currently:<br>cleaning bottles.</p>
        <span class="label reveal delay-1">DOURO VALLEY → PORTO → EVERYWHERE ELSE</span>
      </div>
    </section>

    <!-- 04 -->
    <section class="screen" id="s4">
      <div class="content align-right-bottom">
        <p class="name reveal">JONAS BROSCH</p>
        <nav class="links reveal delay-1" aria-label="Online presence">
          <a href="https://www.linkedin.com/in/jonas-brosch-611693129/"
             target="_blank" rel="noopener noreferrer"
             class="link">LinkedIn</a>
          <a href="https://www.instagram.com/aflorestamos/"
             target="_blank" rel="noopener noreferrer"
             class="link">@aflorestamos</a>
        </nav>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
