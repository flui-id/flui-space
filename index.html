<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flui.</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 5px;
      height: 5px;
      background: #a0a09a;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      z-index: 1000;
      transition: width .2s, height .2s, background .2s, border-radius .2s;
    }
    #cursor.on-sound {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid rgba(194,208,232,.45);
      border-radius: 50%;
    }
    #cursor.on-systems {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid rgba(224,212,184,.45);
      border-radius: 50%;
    }

    /* Labels — same font, different color */
    .label {
      position: fixed;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(38px, 9vw, 118px);
      letter-spacing: -0.03em;
      line-height: 1;
      will-change: transform;
      cursor: none;
      user-select: none;
      transition: opacity .4s;
      opacity: .72;
    }
    .label:hover { opacity: 1; }

    #lbl-sound {
      top: 9vh;
      left: 6vw;
      color: #c2d0e8; /* cold — sound world */
    }

    #lbl-systems {
      bottom: 11vh;
      right: 5vw;
      color: #e0d4b8; /* warm — systems world */
      text-align: right;
    }

    /* Logo mark */
    #logo-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      will-change: transform;
    }
    #logo-svg {
      display: block;
      width: 150px;
      height: 150px;
      transform: translate(-50%, -50%);
    }

    /* Wordmark */
    #wordmark {
      position: fixed;
      bottom: 2.8vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      color: #a0a09a;
      opacity: .3;
      pointer-events: none;
      white-space: nowrap;
    }
    #wordmark::after {
      content: '_';
      animation: blink 1.2s step-end infinite;
    }

    /* Footer — legal links */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 12px clamp(20px, 4vw, 48px);
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      z-index: 800;
    }
    footer a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      color: rgba(160,160,154,.35);
      text-decoration: none;
      cursor: none;
      transition: color .3s;
    }
    footer a:hover { color: rgba(160,160,154,.75); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="lbl-sound" class="label">SOUND</div>

<div id="logo-wrap">
  <svg id="logo-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="9" markerHeight="7"
              refX="9" refY="3.5" orient="auto"
              markerUnits="userSpaceOnUse">
        <polygon points="0 0, 9 3.5, 0 7" fill="#a0a09a" opacity=".7"/>
      </marker>
    </defs>
    <!-- Structural triangle -->
    <polygon points="100,28 158.9,130 41.1,130"
             stroke="#a0a09a" stroke-width=".4"
             fill="none" stroke-dasharray="2 7" opacity=".2"/>
    <!-- Flow arcs -->
    <path d="M 121.1,32.8 A 68,68 0 0,1 166.5,111.1"
          stroke="#a0a09a" stroke-width="1.4" stroke-linecap="round"
          marker-end="url(#arr)" opacity=".65"/>
    <path d="M 145.1,147.1 A 68,68 0 0,1 54.9,147.1"
          stroke="#a0a09a" stroke-width="1.4" stroke-linecap="round"
          marker-end="url(#arr)" opacity=".65"/>
    <path d="M 33.5,111.1 A 68,68 0 0,1 78.9,32.8"
          stroke="#a0a09a" stroke-width="1.4" stroke-linecap="round"
          marker-end="url(#arr)" opacity=".65"/>
    <!-- Vertex nodes -->
    <circle cx="100"   cy="28"  r="3" fill="#a0a09a" opacity=".75"/>
    <circle cx="158.9" cy="130" r="3" fill="#a0a09a" opacity=".75"/>
    <circle cx="41.1"  cy="130" r="3" fill="#a0a09a" opacity=".75"/>
  </svg>
</div>

<div id="lbl-systems" class="label">SYSTEMS</div>

<div id="wordmark">flui.</div>

<footer>
  <a href="legal.html">Legal Notice</a>
  <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
  const cursor   = document.getElementById('cursor');
  const logoWrap = document.getElementById('logo-wrap');
  const lblSound = document.getElementById('lbl-sound');
  const lblSys   = document.getElementById('lbl-systems');

  let mx = 0, my = 0, sx = 0, sy = 0;
  let lastTime = performance.now();

  window.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    mx = (e.clientX / window.innerWidth  - .5) * 2;
    my = (e.clientY / window.innerHeight - .5) * 2;
  });

  lblSound.addEventListener('mouseenter', () => cursor.classList.add('on-sound'));
  lblSound.addEventListener('mouseleave', () => cursor.classList.remove('on-sound'));
  lblSys.addEventListener('mouseenter',   () => cursor.classList.add('on-systems'));
  lblSys.addEventListener('mouseleave',   () => cursor.classList.remove('on-systems'));

  lblSound.addEventListener('click', () => window.location.href = 'sound.html');
  lblSys.addEventListener('click',   () => window.location.href = 'systems.html');

  // Footer links — restore default cursor
  document.querySelectorAll('footer a').forEach(a => {
    a.style.cursor = 'pointer';
  });

  function loop(now) {
    const dt = now - lastTime; lastTime = now;
    sx += (mx - sx) * .045;
    sy += (my - sy) * .045;
    lblSound.style.transform  = `translate(${sx*22}px,${sy*14}px)`;
    lblSys.style.transform    = `translate(${-sx*16}px,${-sy*10}px)`;
    logoWrap.style.transform  =
      `translate(calc(-50% + ${sx*6}px),calc(-50% + ${sy*6}px))`;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
