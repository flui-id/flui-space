<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flui.space</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { height: 100%; }

    body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Two halves ── */
    .half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .half--day   { background: #e0d4b8; }
    .half--night { background: #04080f; }

    /* Scanlines on night half */
    .half--night::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Brand blocks ── */
    .brand-block {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      gap: clamp(8px, 1.5vw, 14px);
      position: relative;
      z-index: 2;
      user-select: none;
    }

    .brand-logo {
      width:  clamp(44px, 9vw, 82px);
      height: clamp(44px, 9vw, 82px);
    }

    /* ── Word labels ── */
    .word {
      line-height: 1;
      user-select: none;
      position: relative;
      z-index: 2;
    }

    .half--day .word {
      font-family: 'Vagra', sans-serif;
      font-weight: 400;
      font-size: clamp(36px, 8vw, 80px);
      letter-spacing: -0.01em;
      color: #C87533;
      white-space: nowrap;
      animation: logo-pulse 2.8s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    @keyframes logo-pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1; }
    }

    .half--night .word {
      font-family: 'PicNic', serif;
      font-weight: 400;
      font-size: clamp(22px, 5.5vw, 58px);
      letter-spacing: 0.01em;
      color: #c2d0e8;
      opacity: .78;
    }

    /* CSS vars for logo */
    :root { --copper: #C87533; }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.7; }
    }

    /* ── Touch ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      transform: scale(0);
      opacity: 1;
      animation: ripple .75s ease-out forwards;
    }
    .half--day   .ripple { background: rgba(26,21,16,.09); }
    .half--night .ripple { background: rgba(194,208,232,.07); }
    @keyframes ripple { to { transform: scale(6); opacity: 0; } }

    /* ── Animated wave at seam ── */
    #wave {
      position: fixed;
      left: 0;
      width: 100%;
      height: 80px;
      top: calc(50vh - 40px);
      top: calc(50dvh - 40px);
      z-index: 10;
      pointer-events: none;
      display: block;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 10px clamp(16px, 4vw, 48px);
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      z-index: 200;
    }
    footer a {
      font-family: 'Avara', serif;
      font-size: 9px;
      letter-spacing: .12em;
      color: rgba(160,160,154,.28);
      text-decoration: none;
      transition: color .3s;
    }
    footer a:hover { color: rgba(160,160,154,.7); }

    @media (pointer: coarse) {
      #cursor { display: none; }
    }

    /* ── Desktop cursor (fine pointer only) ── */
    @media (pointer: fine) {
      .half, footer a { cursor: none; }
      #cursor {
        position: fixed;
        width: 5px; height: 5px;
        background: #a0a09a;
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%,-50%);
        z-index: 1000;
        transition: width .2s, height .2s, border .2s, background .2s;
      }
      #cursor.on-sys {
        width: 36px; height: 36px;
        background: transparent;
        border: 1px solid rgba(26,21,16,.3);
      }
      #cursor.on-snd {
        width: 36px; height: 36px;
        background: transparent;
        border: 1px solid rgba(194,208,232,.4);
      }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div class="half half--day" id="sys">
  <div class="brand-block">
    <svg class="brand-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <g opacity="0.18">
        <line x1="12" y1="8" x2="12" y2="40" stroke="#1A1510" stroke-width="0.4"/>
        <line x1="24" y1="8" x2="24" y2="40" stroke="#1A1510" stroke-width="0.4"/>
        <line x1="36" y1="8" x2="36" y2="40" stroke="#1A1510" stroke-width="0.4"/>
        <line x1="8" y1="12" x2="40" y2="12" stroke="#1A1510" stroke-width="0.4"/>
        <line x1="8" y1="24" x2="40" y2="24" stroke="#1A1510" stroke-width="0.4"/>
        <line x1="8" y1="36" x2="40" y2="36" stroke="#1A1510" stroke-width="0.4"/>
      </g>
      <g style="transform-origin:center;animation:rotate 2.5s linear infinite">
        <path fill="none" stroke="#C87533" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="51" stroke-dashoffset="51"
          d="M 23.7,16.1 C 28.3,15.6 32.4,19.3 32.3,23.9 C 32.2,28.6 28.7,32.4 24.1,32.2 C 19.4,32.0 15.7,28.3 15.8,23.7 C 15.9,19.0 19.4,16.5 23.7,16.1">
          <animate attributeName="stroke-dashoffset" values="51;0;51" dur="3s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
          <animate attributeName="stroke-width" values="0.2;2;0.2" dur="3s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
          <animate attributeName="stroke" values="#C87533;#C87533;rgba(26,21,16,.35);rgba(26,21,16,.35);rgba(26,21,16,.25);rgba(26,21,16,.25)" dur="6s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
        </path>
      </g>
      <g style="transform-origin:center;animation:rotate 3.5s linear infinite;transform:rotate(120deg)">
        <path fill="none" stroke="rgba(26,21,16,.35)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="83" stroke-dashoffset="83"
          d="M 23.6,11.2 C 31.0,10.8 37.2,16.5 37.3,23.9 C 37.4,31.4 31.5,37.4 24.1,37.2 C 16.6,37.0 10.8,31.0 10.9,23.6 C 11.0,16.2 16.7,11.5 23.6,11.2">
          <animate attributeName="stroke-dashoffset" values="83;0;83" dur="3s" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
          <animate attributeName="stroke-width" values="0.2;2.2;0.2" dur="3s" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
          <animate attributeName="stroke" values="rgba(26,21,16,.35);rgba(26,21,16,.35);rgba(26,21,16,.25);rgba(26,21,16,.25);#C87533;#C87533" dur="6s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
        </path>
      </g>
      <g style="transform-origin:center;animation:rotate 4.5s linear infinite;transform:rotate(240deg)">
        <path fill="none" stroke="rgba(26,21,16,.25)" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="115" stroke-dashoffset="115"
          d="M 23.4,6.3 C 33.5,5.8 42.3,13.8 42.4,23.8 C 42.5,33.9 34.1,42.5 24.0,42.3 C 13.9,42.1 5.8,33.5 6.0,23.5 C 6.2,13.4 13.9,6.7 23.4,6.3">
          <animate attributeName="stroke-dashoffset" values="115;0;115" dur="3s" begin="1s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
          <animate attributeName="stroke-width" values="0.2;2.5;0.2" dur="3s" begin="1s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
          <animate attributeName="stroke" values="rgba(26,21,16,.25);rgba(26,21,16,.25);#C87533;#C87533;rgba(26,21,16,.35);rgba(26,21,16,.35)" dur="6s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
        </path>
      </g>
    </svg>
    <span class="word" id="lbl-systems">flui</span>
  </div>
</div>

<!-- Wave SVG covers the seam, animates via JS -->
<svg id="wave" viewBox="0 0 1000 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path id="wave-top" fill="#e0d4b8"/>
  <path id="wave-bot" fill="#04080f"/>
</svg>

<div class="half half--night" id="snd">
  <span class="word" id="lbl-sound">fluid identities</span>
</div>

<footer>
  <a href="legal.html">Legal Notice</a>
  <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
  const sys      = document.getElementById('sys');
  const snd      = document.getElementById('snd');
  const lblSys   = document.getElementById('lbl-systems');
  const lblSound = document.getElementById('lbl-sound');
  const waveTop  = document.getElementById('wave-top');
  const waveBot  = document.getElementById('wave-bot');
  const cursor   = document.getElementById('cursor');

  /* ── Animated wave ── */
  let wt = 0;
  (function animWave() {
    wt += 0.006;
    const N = 120;
    const pts = [];
    for (let i = 0; i <= N; i++) {
      const x = (i / N) * 1000;
      const y = 40
        + Math.sin((i / N) * Math.PI * 2 + wt) * 10
        + Math.sin((i / N) * Math.PI * 3.7 + wt * 1.4) * 4;
      pts.push([x.toFixed(1), y.toFixed(1)]);
    }
    const line = pts.map(([x, y]) => `L${x},${y}`).join('');
    const y0 = pts[0][1], yN = pts[N][1];
    waveTop.setAttribute('d', `M0,0 L0,${y0}${line}L1000,0 Z`);
    waveBot.setAttribute('d', `M0,80 L0,${y0}${line}L1000,80 Z`);
    requestAnimationFrame(animWave);
  })();

  /* ── Touch ripple ── */
  function addRipple(el, e) {
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 2;
    const cx   = (e.clientX ?? rect.left + rect.width  / 2) - rect.left;
    const cy   = (e.clientY ?? rect.top  + rect.height / 2) - rect.top;
    const r    = document.createElement('span');
    r.className = 'ripple';
    r.style.cssText = `width:${size}px;height:${size}px;left:${cx - size/2}px;top:${cy - size/2}px`;
    el.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  sys.addEventListener('pointerdown', e => addRipple(sys, e));
  snd.addEventListener('pointerdown', e => addRipple(snd, e));

  /* ── Navigation ── */
  sys.addEventListener('click', () => { sys.style.opacity = '.6'; setTimeout(() => location.href = 'systems.html', 180); });
  snd.addEventListener('click', () => { snd.style.opacity = '.6'; setTimeout(() => location.href = 'sound.html',   180); });

  /* ── Desktop cursor ── */
  if (window.matchMedia('(pointer: fine)').matches) {
    window.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    sys.addEventListener('mouseenter', () => cursor.classList.add('on-sys'));
    sys.addEventListener('mouseleave', () => cursor.classList.remove('on-sys'));
    snd.addEventListener('mouseenter', () => cursor.classList.add('on-snd'));
    snd.addEventListener('mouseleave', () => cursor.classList.remove('on-snd'));
  }

  /* ── Per-character floating on "fluid identities" only ── */
  const floatChars = [];
  const text = lblSound.textContent;
  lblSound.innerHTML = '';
  for (const ch of text) {
    if (ch === ' ') {
      lblSound.appendChild(document.createTextNode(' '));
    } else {
      const s = document.createElement('span');
      s.textContent = ch;
      s.style.display = 'inline-block';
      lblSound.appendChild(s);
      floatChars.push({
        el: s,
        ax: 4 + Math.random() * 6,
        ay: 5 + Math.random() * 8,
        fx: 0.00015 + Math.random() * 0.00022,
        fy: 0.00015 + Math.random() * 0.00022,
        px: Math.random() * Math.PI * 2,
        py: Math.random() * Math.PI * 2,
      });
    }
  }

  (function floatLoop(t) {
    for (const c of floatChars) {
      const x = c.ax * Math.sin(t * c.fx + c.px);
      const y = c.ay * Math.sin(t * c.fy + c.py);
      c.el.style.transform = `translate(${x.toFixed(2)}px,${y.toFixed(2)}px)`;
    }
    requestAnimationFrame(floatLoop);
  })();
</script>
</body>
</html>
