<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flui.</title>
  <link rel="stylesheet" href="fonts.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e0d4b8; /* Tag/warm oben */
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Harter Übergang - untere Hälfte Nacht */
    body::before {
      content: '';
      position: fixed;
      top: 50vh;
      left: 0;
      right: 0;
      bottom: 0;
      background: #04080f; /* Nacht/kalt unten */
      z-index: 1;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* Custom cursor (desktop only) */
    @media (pointer: fine) {
      #cursor {
        position: fixed;
        width: 5px;
        height: 5px;
        background: #a0a09a;
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%,-50%);
        z-index: 1000;
        transition: width .2s, height .2s, background .2s, border-radius .2s;
      }
      #cursor.on-systems {
        width: 36px; height: 36px;
        background: transparent;
        border: 1px solid rgba(26,21,16,.3);
        border-radius: 50%;
      }
      #cursor.on-sound {
        width: 36px; height: 36px;
        background: transparent;
        border: 1px solid rgba(194,208,232,.45);
        border-radius: 50%;
      }
      .label { cursor: none; }
      footer a { cursor: none; }
    }

    /* Labels */
    .label {
      position: fixed;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(38px, 9vw, 118px);
      letter-spacing: -0.03em;
      line-height: 1;
      will-change: transform;
      cursor: pointer;
      user-select: none;
      transition: opacity .4s;
      opacity: .72;
      z-index: 100;
    }
    .label:hover { opacity: 1; }

    /* SYSTEMS - oben, dunkel auf hell */
    #lbl-systems {
      top: 9vh;
      left: 6vw;
      color: #1A1510;
    }

    /* SOUND - unten, hell auf dunkel */
    #lbl-sound {
      bottom: 11vh;
      right: 5vw;
      color: #c2d0e8;
      text-align: right;
    }

    /* Wordmark */
    #wordmark {
      position: fixed;
      bottom: 2.8vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      color: #a0a09a;
      opacity: .3;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #wordmark::after {
      content: '_';
      animation: blink 1.2s step-end infinite;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 12px clamp(20px, 4vw, 48px);
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      z-index: 800;
    }
    footer a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      color: rgba(160,160,154,.35);
      text-decoration: none;
      cursor: pointer;
      transition: color .3s;
    }
    footer a:hover { color: rgba(160,160,154,.75); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="lbl-systems" class="label">SYSTEMS</div>
<div id="lbl-sound" class="label">SOUND</div>

<div id="wordmark">flui.</div>

<footer>
  <a href="legal.html">Legal Notice</a>
  <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
  const cursor   = document.getElementById('cursor');
  const lblSys   = document.getElementById('lbl-systems');
  const lblSound = document.getElementById('lbl-sound');

  let mx = 0, my = 0, sx = 0, sy = 0;
  let lastTime = performance.now();
  
  const isMobile = window.matchMedia("(pointer: coarse)").matches;
  
  if (isMobile) {
    // Mobile: Automatische subtile Animation
    function mobileLoop(now) {
      const t = now * 0.0003;
      mx = Math.sin(t) * 0.3;
      my = Math.cos(t * 0.7) * 0.2;
      
      sx += (mx - sx) * .045;
      sy += (my - sy) * .045;
      
      lblSys.style.transform   = `translate(${sx*22}px,${sy*14}px)`;
      lblSound.style.transform = `translate(${-sx*16}px,${-sy*10}px)`;
      
      requestAnimationFrame(mobileLoop);
    }
    requestAnimationFrame(mobileLoop);
  } else {
    // Desktop: Mouse-tracking
    window.addEventListener('mousemove', e => {
      if (cursor) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
      }
      mx = (e.clientX / window.innerWidth  - .5) * 2;
      my = (e.clientY / window.innerHeight - .5) * 2;
    });

    if (cursor) {
      lblSys.addEventListener('mouseenter',   () => cursor.classList.add('on-systems'));
      lblSys.addEventListener('mouseleave',   () => cursor.classList.remove('on-systems'));
      lblSound.addEventListener('mouseenter', () => cursor.classList.add('on-sound'));
      lblSound.addEventListener('mouseleave', () => cursor.classList.remove('on-sound'));
    }

    function loop(now) {
      const dt = now - lastTime; lastTime = now;
      sx += (mx - sx) * .045;
      sy += (my - sy) * .045;
      lblSys.style.transform   = `translate(${sx*22}px,${sy*14}px)`;
      lblSound.style.transform = `translate(${-sx*16}px,${-sy*10}px)`;
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  // Click handlers
  lblSys.addEventListener('click',   () => window.location.href = 'systems.html');
  lblSound.addEventListener('click', () => window.location.href = 'sound.html');
</script>
</body>
</html>
